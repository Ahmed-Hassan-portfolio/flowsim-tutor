name: ci

on:
  push:
  pull_request:

jobs:
  unit:
    name: Fast unit tests (no RAG deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev-only deps
        run: |
          python -m pip install --upgrade pip
          # Install pure-Python deps; skip the heavy RAG stack to keep this job fast.
          python -m pip install pydantic pytest pytest-asyncio "mcp[cli]>=1.0,<2.0"
      - name: Run fast tests
        run: python -m pytest -q --ignore=tests/test_indexer.py --ignore=tests/test_retriever.py

  rag:
    name: RAG integration tests (chromadb + sentence-transformers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install full deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run full test suite
        run: python -m pytest -q
